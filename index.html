<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Music Portfolio</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            margin: 0;
            padding: 20px;
        }
        header {
            text-align: center;
            padding: 50px 0;
            background-color: #333;
            color: white;
        }
        section {
            margin: 20px 0;
        }
        .track {
            background-color: white;
            padding: 20px;
            margin-bottom: 10px;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
        }
    </style>
</head>
<body>
    <header>
        <h1>My Music Portfolio</h1>
        <p>Welcome to my collection of musical works</p>
    </header>

    <section>
        <h2>Featured Tracks</h2>
        <div class="track">
            <h3>Track 1: Melody of Dreams</h3>
            <audio controls>
                <source src="music/melody_of_dreams.mp3" type="audio/mp3">
                Your browser does not support the audio element.
            </audio>
        </div>
        <div class="track">
            <h3>Track 2: Rhythm of the Night</h3>
            <audio controls>
                <source src="music/rhythm_of_the_night.mp3" type="audio/mp3">
                Your browser does not support the audio element.
            </audio>
        </div>
    </section>
</body>
</html>
